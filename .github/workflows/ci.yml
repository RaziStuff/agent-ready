name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: npm run snapshots:check
      - run: npm run validate:strict
      - run: npm run package:check
      - run: npm run package:install-smoke
      - run: npm run release:notes:check
